name: Lint (pre-commit)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "main"

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6

      - name: Install Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: 1.25.x
          cache: true

      - run: go run mage.go lint
